name: Publish to PyPI

# Publishes to PyPI when you cut a GitHub Release. Uses PyPI Trusted
# Publishing (OIDC) — no API token or password stored in the repo.
on:
  release:
    types: [published]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Check metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # Optional but recommended: create a "pypi" environment in the repo
    # settings. Remove this block (and leave the PyPI "Environment name"
    # field blank) if you prefer not to use one.
    environment:
      name: pypi
      url: https://pypi.org/project/pytakeoff/
    permissions:
      id-token: write        # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
